# M-Team API 配置文件示例
# 复制此文件为 config.yaml 并填入你的实际配置

# API Key (必需)
# 从 M-Team 站点设置中获取
api_key: "your_mteam_api_key_here"

# 代理配置 (可选但推荐)
# 用于防止 Cloudflare 拦截,解决 502 错误
# 如果已在软路由/系统层面配置了全局代理,可以设置为 null
proxies:
  http: "http://127.0.0.1:7890"
  https: "http://127.0.0.1:7890"

# Telegram Bot Token (可选)
# 用于发送通知到 Telegram
# 获取方式: 与 @BotFather 对话创建 Bot 获取 Token
# 留空或删除此行则不使用 Telegram 通知功能
telegram_token: ""

# 请求超时时间 (秒)
timeout: 15

# 注意事项:
# 1. 默认代理端口: Clash=7890, v2ray=10809, 根据你的实际软件修改
# 2. 如果使用系统级代理,可以将 proxies 设置为 null 或删除此配置
# 3. 请妥善保管 API Key 和 Telegram Token,不要将 config.yaml 提交到版本控制系统
